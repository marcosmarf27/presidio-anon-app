appId: com.presidio.anon
productName: Presidio Anon
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - from: resources/python-backend/
    to: python-backend/
    filter:
      - "**/*"
      - "!__pycache__/**"
      - "!*.pyc"
      - "!*.dist-info/**"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
